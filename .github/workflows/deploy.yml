name: Deploy MkDocs Site
on:
  push:
    branches: [main]
    paths: ['docs/**', 'mkdocs.yml', 'generate-nav.py']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs mkdocs-material pyyaml

      - name: Generate & build
        run: |
          python3 generate-nav.py
          mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
