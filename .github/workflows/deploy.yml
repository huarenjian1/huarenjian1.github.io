name: Deploy MkDocs Site
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install mkdocs mkdocs-material pyyaml
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Sync from data capsule
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          rclone sync data-capsule:huarenjian/vault-hrj /tmp/notes --include "*.md"

      - name: Generate & build
        run: |
          rm -rf docs && mkdir docs
          rsync -am --include='*/' --include='*.md' --exclude='*' /tmp/notes/ docs/
          python3 generate-nav.py
          mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
